<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Global Coastal Adventures</title>
    <meta
      name="description"
      content="Global Coastal Adventures publishes mobile games, including Final Fool."
    >
    <style>
      :root {
        color-scheme: light;
        --ink: #17211d;
        --muted: #5d6c66;
        --felt: #17644b;
        --gold: #d6a633;
        --paper: #f8f5ee;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #0d392d, var(--felt));
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(720px, calc(100% - 32px));
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: 8px;
        background: var(--paper);
        padding: 28px;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.22);
      }

      h1 {
        margin: 0 0 10px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(36px, 8vw, 64px);
        line-height: 0.95;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.5;
      }

      a {
        color: var(--felt);
        font-weight: 800;
      }

      .badge {
        display: inline-block;
        margin-bottom: 16px;
        color: #7b5c10;
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .game {
        margin-top: 22px;
        border-left: 4px solid var(--gold);
        padding-left: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Mobile Games</span>
      <h1>Global Coastal Adventures</h1>
      <p>Global Coastal Adventures publishes mobile games for iPhone and iPad.</p>
      <section class="game" aria-label="Final Fool">
        <p><strong>Final Fool</strong> is an idiot card game available on the App Store.</p>
      </section>
      <p>Contact: <a href="mailto:support@globalcoastaladventures.com">support@globalcoastaladventures.com</a></p>
    </main>
  </body>
</html>
